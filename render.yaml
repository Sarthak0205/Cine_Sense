services:
  - type: web
    name: cinesense-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CINESENSE_MODEL_DIR
        value: cinesense/models/twostage_v1
      - key: ALLOWED_ORIGINS
        value: ""
